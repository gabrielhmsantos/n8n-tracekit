name: Build n8n-tracekit image

on:
  workflow_dispatch:
    inputs:
      n8n_version:
        description: "n8n version (ex: 2.6.4). Leave empty or use 'latest' to resolve from releases."
        required: false
        type: string
      tag_suffix:
        description: "Optional tag suffix (ex: beta -> 2.6.4-beta)"
        required: false
        type: string
      force_update:
        description: "Force rebuild even if the tag already exists"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  IMAGE_NAME: gabrielhmsantos/n8n-tracekit

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve n8n version
        id: version
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ github.event.inputs.n8n_version || '' }}"
          INPUT_SUFFIX="${{ github.event.inputs.tag_suffix || '' }}"
          TAG_LATEST="false"
          if [ -z "$INPUT_VERSION" ] || [ "$INPUT_VERSION" = "latest" ]; then
            TAG="$(curl -s https://api.github.com/repos/n8n-io/n8n/releases/latest | jq -r '.tag_name')"
            if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
              echo "Failed to resolve latest release tag" >&2
              exit 1
            fi
            VERSION="$TAG"
            VERSION="${VERSION#n8n@}"
            VERSION="${VERSION#v}"
            TAG_LATEST="true"
          else
            VERSION="$INPUT_VERSION"
            VERSION="${VERSION#n8n@}"
            VERSION="${VERSION#v}"
          fi
          SUFFIX="$INPUT_SUFFIX"
          SUFFIX="${SUFFIX#-}"
          if [ -n "$SUFFIX" ]; then
            VERSION_TAG="${VERSION}-${SUFFIX}"
          else
            VERSION_TAG="${VERSION}"
          fi
          TAGS="${IMAGE_NAME}:${VERSION_TAG}"
          if [ "$TAG_LATEST" = "true" ] && [ -z "$SUFFIX" ]; then
            TAGS="${TAGS}\n${IMAGE_NAME}:latest"
          fi
          {
            echo "version=$VERSION"
            echo "version_tag=$VERSION_TAG"
            echo "tag_latest=$TAG_LATEST"
            echo "tag_suffix=$SUFFIX"
            echo "tags<<EOF"
            printf "%b\n" "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check if image already exists
        id: exists
        run: |
          set -euo pipefail
          FORCE_UPDATE="${{ github.event.inputs.force_update || 'false' }}"
          if [ "$FORCE_UPDATE" = "true" ]; then
            echo "exists_version=false" >> "$GITHUB_OUTPUT"
            echo "exists_latest=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION_TAG="${{ steps.version.outputs.version_tag }}"
          if curl -fsSL "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/${VERSION_TAG}/" >/dev/null; then
            echo "exists_version=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists_version=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "${{ steps.version.outputs.tag_latest }}" = "true" ] && [ -z "${{ steps.version.outputs.tag_suffix }}" ]; then
            if curl -fsSL "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/latest/" >/dev/null; then
              echo "exists_latest=true" >> "$GITHUB_OUTPUT"
            else
              echo "exists_latest=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "exists_latest=not_applicable" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        if: steps.exists.outputs.exists_version != 'true' || (steps.version.outputs.tag_latest == 'true' && steps.exists.outputs.exists_latest != 'true') || github.event.inputs.force_update == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./build
          file: ./build/Dockerfile
          push: true
          tags: ${{ steps.version.outputs.tags }}
          build-args: |
            N8N_VERSION=${{ steps.version.outputs.version }}

      - name: Skip build (image already exists)
        if: github.event.inputs.force_update != 'true' && steps.exists.outputs.exists_version == 'true' && (steps.version.outputs.tag_latest != 'true' || steps.exists.outputs.exists_latest == 'true')
        run: |
          echo "Image already exists for tag ${{ steps.version.outputs.version_tag }}. Skipping build."
